<section class="py-12 px-4 md:px-8">
    <div class="container mx-auto">

        <!-- Header -->
        <div class="text-center mb-12">
            <p class="text-sm font-semibold text-mainColor uppercase tracking-widest mb-2">Discover</p>
            <h1 class="text-4xl font-black text-gray-900 mb-3">All Brands</h1>
            <p class="text-gray-500 text-sm">Explore our curated selection of premium brands.</p>
        </div>

        <!-- Grid -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
            @for (brand of brandsList; track brand._id) {
            <div class="premium-card group cursor-pointer text-center">
                <div class="overflow-hidden">
                    <img [src]="brand.image" [alt]="brand.slug"
                        class="w-full h-36 object-contain p-4 transition-transform duration-500 group-hover:scale-110">
                </div>
                <div class="px-4 pb-4 pt-2 border-t border-gray-50">
                    <h3 class="text-sm font-bold text-gray-800 truncate">{{brand.name}}</h3>
                </div>
            </div>
            }
        </div>

    </div>
</section>
