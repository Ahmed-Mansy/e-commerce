<section class="min-h-screen py-16 px-4" style="background: #F8F5F2;">
    <div class="max-w-lg mx-auto">

        <!-- Header -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-mainColor mx-auto mb-4"
                style="background: rgba(139,94,53,0.1);">
                <i class="fas fa-credit-card text-2xl"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-900">Checkout</h1>
            <p class="text-gray-500 text-sm mt-2">Fill in your shipping details to complete your order.</p>
        </div>

        <!-- Form card -->
        <div class="bg-white rounded-2xl p-8" style="box-shadow: var(--card-shadow);">
            <form [formGroup]="checkOutForm">

                <!-- Shipping Details -->
                <div class="mb-6">
                    <h2 class="text-sm font-bold text-gray-700 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i class="fas fa-map-marker-alt text-mainColor"></i>
                        Shipping Address
                    </h2>

                    <app-input [element]="'text'" [control]="checkOutForm.get('shippingAddress')?.get('details')"
                        [idInput]="'details'" [labelInput]="'Address details'"></app-input>

                    <div class="grid grid-cols-2 gap-4">
                        <app-input [element]="'input'" [control]="checkOutForm.get('shippingAddress')?.get('phone')"
                            [idInput]="'phone'" [typeInput]="'tel'" [labelInput]="'Phone'">
                            Accept only Egypt numbers
                        </app-input>
                        <app-input [element]="'input'" [control]="checkOutForm.get('shippingAddress')?.get('city')"
                            [idInput]="'city'" [typeInput]="'text'" [labelInput]="'City'"></app-input>
                    </div>
                </div>

                <!-- Payment Method -->
                <div>
                    <h2 class="text-sm font-bold text-gray-700 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i class="fas fa-wallet text-mainColor"></i>
                        Payment Method
                    </h2>

                    <div class="grid grid-cols-2 gap-4">
                        <button (click)="submitForm($event)" id="visa"
                            class="group flex flex-col items-center gap-3 p-5 rounded-xl border-2 border-gray-200 hover:border-mainColor hover:bg-amber-50 transition-all duration-200 cursor-pointer">
                            <i class="fas fa-credit-card text-2xl text-gray-400 group-hover:text-mainColor transition-colors duration-200"></i>
                            <span class="text-sm font-bold text-gray-700 group-hover:text-mainColor transition-colors duration-200">Pay by Visa</span>
                        </button>

                        <button (click)="submitForm($event)" id="cash"
                            class="group flex flex-col items-center gap-3 p-5 rounded-xl border-2 border-gray-200 hover:border-mainColor hover:bg-amber-50 transition-all duration-200 cursor-pointer">
                            <i class="fas fa-money-bill-wave text-2xl text-gray-400 group-hover:text-mainColor transition-colors duration-200"></i>
                            <span class="text-sm font-bold text-gray-700 group-hover:text-mainColor transition-colors duration-200">Cash on Delivery</span>
                        </button>
                    </div>
                </div>

            </form>
        </div>

        <!-- Back link -->
        <p class="text-center text-sm text-gray-500 mt-6">
            <a routerLink="/cart" class="hover:text-mainColor transition-colors duration-200">
                <i class="fas fa-arrow-left text-xs mr-1"></i> Back to cart
            </a>
        </p>

    </div>
</section>
