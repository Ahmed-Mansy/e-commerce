<section class="py-12 px-4 md:px-8">
    <div class="container mx-auto">

        <!-- Header -->
        <div class="text-center mb-12">
            <p class="text-sm font-semibold text-mainColor uppercase tracking-widest mb-2">Shop by</p>
            <h1 class="text-4xl font-black text-gray-900 mb-3">All Categories</h1>
            <p class="text-gray-500 text-sm">Browse our full range of product categories.</p>
        </div>

        <!-- Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            @for (category of categriesList; track category._id) {
            <div [routerLink]="['subCategories', category._id, category.slug]"
                class="premium-card group cursor-pointer overflow-hidden relative">
                <!-- Image with overlay -->
                <div class="relative overflow-hidden h-[260px]">
                    <img [src]="category.image" [alt]="category.slug"
                        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-108">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent transition-opacity duration-300"></div>
                    <!-- Overlay content -->
                    <div class="absolute bottom-0 left-0 right-0 p-5 transform translate-y-2 group-hover:translate-y-0 transition-transform duration-300">
                        <h3 class="text-white font-bold text-lg leading-tight">{{category.name}}</h3>
                        <span class="inline-flex items-center gap-1 text-white/70 text-xs mt-1 group-hover:text-white transition-colors duration-200">
                            Shop now <i class="fas fa-arrow-right text-[10px]"></i>
                        </span>
                    </div>
                </div>
            </div>
            }
        </div>

    </div>
</section>
