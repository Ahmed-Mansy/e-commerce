<section class="py-12 px-4 md:px-8">
    <div class="container mx-auto">

        <!-- Header -->
        <div class="text-center mb-10">
            <p class="text-sm font-semibold text-mainColor uppercase tracking-widest mb-2">Explore</p>
            <h1 class="text-4xl font-black text-gray-900 mb-3">All Products</h1>
            <p class="text-gray-500 text-sm">Discover our full collection of curated products.</p>
        </div>

        <!-- Search -->
        <div class="max-w-xl mx-auto mb-10">
            <div class="relative">
                <div class="absolute inset-y-0 start-0 flex items-center ps-4 pointer-events-none">
                    <i class="fas fa-search text-gray-400 text-sm"></i>
                </div>
                <input [(ngModel)]="text" type="search" id="default-search"
                    class="block w-full py-4 ps-12 pe-5 text-sm text-gray-900 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-mainColor/20 focus:border-mainColor transition-all duration-200 shadow-sm"
                    placeholder="Search products..." />
            </div>
        </div>

        <!-- Products Grid -->
        <div class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5">
            @for (product of productList | paginate: { id: 'foo',
            itemsPerPage: pageSize,
            currentPage: p,
            totalItems: total } | search: text ; track product.id) {
            <app-card [product]="product" />
            }
        </div>

        <!-- Pagination -->
        <div class="flex justify-center mt-10">
            <pagination-controls class="my-pagination" id="foo" (pageChange)="onPageChange($event)">
            </pagination-controls>
        </div>

    </div>
</section>
